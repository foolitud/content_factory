<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel Adventure | Recrutement Accomplice</title>
    <style>
        :root {
            /* Official Branding Colors */
            --primary-color: #081E22;
            --accent-color: #DEE9ED;
            --bg-color: #0A1014;
            --text-main: #F8FAFC;
            --link-color: #B8CCE0;
            
            /* Typography */
            --font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        /* Subtle background texture */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(8, 30, 34, 0.4) 0%, rgba(10, 16, 20, 1) 100%);
            z-index: -1;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(8, 30, 34, 0.5);
            border: 1px solid rgba(222, 233, 237, 0.1);
            padding: 48px 32px;
            border-radius: 24px;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .logo-placeholder {
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            margin-bottom: 48px;
            color: var(--accent-color);
            text-transform: uppercase;
            opacity: 0.8;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(248, 250, 252, 0.7);
            margin-bottom: 48px;
        }

        .agent-callout {
            color: var(--accent-color);
            background: rgba(222, 233, 237, 0.1);
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-primary {
            display: inline-block;
            width: 100%;
            padding: 20px;
            background: var(--accent-color);
            color: #0B1114; /* buttonPrimary.textColor */
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 12px; /* buttonPrimary.borderRadius */
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 24px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(222, 233, 237, 0.2);
        }

        .btn-secondary {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: #F8FAFC; /* buttonSecondary.textColor */
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 0px; /* buttonSecondary.borderRadius */
            border: 1px solid rgba(222, 233, 237, 0.2);
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            border-color: var(--accent-color);
        }

        .footer-meta {
            margin-top: 40px;
            font-size: 0.75rem;
            color: rgba(248, 250, 252, 0.3);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-placeholder">Parallel Adventure</div>
        
        <h1>Mission : Accomplice</h1>
        <p>L'Agent <span class="agent-callout">Lolo</span> vous a désigné comme contact de confiance pour l'extraction de données à Paris.</p>

        <a href="https://wa.me/33644605927?text=Mission%20accept%C3%A9e.%20Je%20suis%20l'Accomplice%20de%20Lolo." class="btn-primary">Accepter la Mission</a>
        
        <a href="#" class="btn-secondary">Voir le Briefing Privé</a>

        <div class="footer-meta">Encrypted Connection // Protocol 081E22</div>
    </div>
</body>
</html>
